<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nested Iframe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      color: #01060b;
    }

    .iframe-container {
      width: 100%;
      max-width: 1000px;
      height: 100%;
      max-height: 1000px;
      border: 2px solid #d9dde0;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>
  <h1>Nested Iframe</h1>
  <div class="iframe-container">
    <iframe src="https://qa-live-server-internal.bsstag.com/healing/pages/iframe.html" name="loginFrame" id="loginFrame"></iframe>
  </div>

</body>

</html>
