<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
  <title>Nested Shadow DOM</title>
</head>

<body>
  <div id="navbar"></div>
  <root-element></root-element>
  <script src="../scripts/script.js"></script>
  <script>
    class LoginComponent extends HTMLElement {
      constructor() {
        super();
        const shadow = this.attachShadow({ mode: 'open' });

        shadow.innerHTML = `
          <style>
            .login-container {
              max-width: 800px;
              padding: 20px;
              background-color: white;
              box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
              border-radius: 8px;
              text-align: center;
              margin: 0 auto;
              overflow: hidden;
            }
            header {
              margin-bottom: 20px;
            }
            header h1 {
              margin: 0;
              font-size: 24px;
            }
            .form-group {
              margin-bottom: 15px;
            }
            .form-group label {
              display: block;
              margin-bottom: 5px;
              text-align: left;
            }
            .form-group input[type="text"],
            .form-group input[type="password"] {
              width: 100%;
              padding: 10px;
              margin: 5px 0;
              border: 1px solid #ddd;
              border-radius: 4px;
              box-sizing: border-box;
            }
            .form-group input[type="checkbox"] {
              margin-right: 5px;
            }
            .form-group button {
              width: 100%;
              padding: 10px;
              background-color: #007bff;
              border: none;
              color: white;
              border-radius: 4px;
              font-size: 16px;
              cursor: pointer;
            }
            .form-group button:hover {
              background-color: #0056b3;
            }
            footer {
              margin-top: 20px;
            }
            .dropdown {
              position: absolute;
              top: 20px;
              right: 10px;
              z-index: 1;
            }
            .dropdown select {
              padding: 5px;
              border: 1px solid #ddd;
              border-radius: 4px;
              background-color: white;
              font-size: 14px;
            }
            @media (max-width: 480px) {
              .login-container {
                padding: 10px;
              }
              header h1 {
                font-size: 20px;
              }
              .form-group label {
                font-size: 14px;
              }
              .form-group input,
              .form-group button {
                font-size: 14px;
                padding: 8px;
              }
              .dropdown select {
                font-size: 12px;
              }
            }
          </style>
          <div class="login-container">
            <div class="dropdown">
              <label for="viewSelector">View:</label>
              <select id="viewSelector">
                <option value="Original">Original</option>
                <option value="Modified">Modified</option>
                <option value="For AI Healing">For AI Healing</option>
              </select>
            </div>
            <header>
              <h1>Login</h1>
            </header>
            <form>
              <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Username">
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password">
              </div>
              <div class="form-group">
                <label><input type="checkbox">I agree to the Terms & Conditions</label>
              </div>
              <div class="form-group">
                <button type="button" id="loginButton">Login</button>
              </div>
            </form>
            <footer>
              <p>&copy; 2024 Your Company. All rights reserved.</p>
            </footer>
          </div>
        `;

        this.updateAttributes = this.updateAttributes.bind(this);
      }

      connectedCallback() {
        this.shadowRoot.querySelector('#viewSelector').addEventListener('change', this.updateAttributes);
        this.updateAttributes();
      }

      updateAttributes() {
        const view = this.shadowRoot.getElementById("viewSelector").value;
        const username = this.shadowRoot.querySelectorAll("input")[0];
        const password = this.shadowRoot.querySelectorAll("input")[1];
        const loginButton = this.shadowRoot.querySelectorAll("button")[0];

        if (view === "Original") {
          username.setAttribute("type", "text");
          username.setAttribute("name", "username");
          username.setAttribute("id", "username");
          username.setAttribute("placeholder", "Username");
          username.removeAttribute("class");

          password.setAttribute("type", "password");
          password.setAttribute("name", "password");
          password.setAttribute("id", "password");
          password.setAttribute("placeholder", "Password");
          password.removeAttribute("class");

          loginButton.setAttribute("type", "button");
          loginButton.setAttribute("name", "loginButton");
          loginButton.setAttribute("id", "loginButton");
          loginButton.removeAttribute("class");
          loginButton.innerHTML = "Login";
        } else if (view === "Modified") {
          username.setAttribute("type", "text");
          username.removeAttribute("id");
          username.setAttribute("name", "username");
          username.setAttribute("placeholder", "Modified Username");
          username.setAttribute("class", "modified-input");

          password.setAttribute("type", "password");
          password.setAttribute("name", "password");
          password.removeAttribute("id");
          loginButton.setAttribute("name", "loginButton");
          password.setAttribute("placeholder", "Modified Password");
          password.setAttribute("class", "modified-input");

          loginButton.setAttribute("type", "button");
          loginButton.removeAttribute("id");
          loginButton.setAttribute("class", "modified-button");
          loginButton.innerHTML = "Login";
        } else if (view === "For AI Healing") {
          username.removeAttribute("id");
          username.removeAttribute("type");
          username.setAttribute("name", "ai_username");
          username.removeAttribute("placeholder");
          username.removeAttribute("class");

          password.removeAttribute("id");
          password.removeAttribute("type");
          password.setAttribute("name", "ai_password");
          password.removeAttribute("placeholder");
          password.removeAttribute("class");

          loginButton.removeAttribute("id");
          loginButton.removeAttribute("type");
          loginButton.setAttribute("name", "ai_loginButton");
          loginButton.removeAttribute("class");
          loginButton.innerHTML = "AI Healing Login";
        }
      }
    }

    class RootElement extends HTMLElement {
      constructor() {
        super();
        const shadow = this.attachShadow({ mode: 'open' });

        shadow.innerHTML = `
          <style>
            .container {
              width: 100%;
              max-width: 500px;
              padding: 20px;
              background-color: white;
              box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
              border-radius: 8px;
              text-align: center;
            }
            h1 {
              font-size: 24px;
              text-align: center;
            }
            @media (max-width: 480px) {
              .container {
                padding: 10px;
              }
              h1 {
                font-size: 20px;
              }
            }
          </style>
          <div class="container">
            <h1>Sample Application</h1>
            <login-page></login-page>
          </div>
        `;
      }
    }

    customElements.define('login-page', LoginComponent);
    customElements.define('root-element', RootElement);
  </script>
</body>

</html>
