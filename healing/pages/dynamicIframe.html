            function addSelection(type, containerId) {
                const selectElement = document.getElementById(type);
                const selectedValue = selectElement.value;
                if (selectedValue === "") return;
                const container = document.getElementById(containerId);
                if (container.querySelector(`[data-value="${selectedValue}"]`)) {
                    return;

                const item = document.createElement("div");

                item.setAttribute("data-value", selectedValue);
                item.innerHTML = `${selectedValue} <span class="remove" onclick="removeSelection(&#39;${type}&#39;, &#39;${selectedValue}&#39;)">x</span>`;
                container.appendChild(item);
            }

            const length = 8; 
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

        const randomString = generateRandomString();
        const newUrl = window.location.origin + '/dynamic-' + randomString + '.html';
        history.pushState(null, '', newUrl);
        document.getElementById('current-url').textContent = newUrl;
    </script>
