<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login in iFrame</title>
  <link rel="stylesheet" href="../css/style.css"> <!-- Link to your common styles -->
  <style>
    /* Ensure the iframe is responsive */
    .iframe-container {
      width: 100%;
      height: 100vh;
      /* Full height of the viewport */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    iframe {
      width: 100%;
      max-width: 500px;
      /* Limit iframe width */
      height: 80%;
      /* Adjust height */
      border: 1px solid #ccc;
      /* Add a border */
      border-radius: 8px;
      /* Rounded corners */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      /* Subtle shadow for effect */
    }

    @media screen and (max-width: 600px) {
      iframe {
        height: 100%;
        /* Full height for smaller screens */
      }
    }
  </style>
</head>

<body>
  <div class="iframe-container">
    <iframe src="http://127.0.0.1:5500/live_server/public/healing/pages/registration-ai-one.html" title="Login Page" frameborder="0"></iframe>
  </div>
</body>

</html>
