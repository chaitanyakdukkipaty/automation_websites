<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Context Generator Simple Html Forms</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f4f4f4;
        line-height: 1.6;
      }

      form {
        background-color: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      div[role="group"] {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }

      input[type="checkbox"] {
        width: auto;
        margin-right: 10px;
      }

      input[type="range"] {
        width: 100%;
        margin-top: 10px;
      }

      button {
        background-color: #007bff;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #0056b3;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
      }

      input:invalid {
        border-color: #dc3545;
      }
    </style>
  </head>
  <body>
    <form
      id="comprehensive-form"
      name="nestedAttributesForm"
      autocomplete="on"
      data-test="form-validation"
      zigzag-universe="quantum-whisper"
      cosmic-potato="spinning-neutron"
    >
      <label
        for="full-name"
        data-cy="name-label"
        data-qa="full-name-label"
        cosmic-waffle="quantum-unicorn"
        >Full Name</label
      >
      <input
        type="text"
        id="full-name"
        name="fullName"
        placeholder="Enter your full name"
        required
        minlength="2"
        maxlength="50"
        pattern="[A-Za-z\s]+"
        autocapitalize="words"
        data-test-id="name-input"
        data-ti="user-fullname"
        rainbow-llama="disco-potato"
        ninja-pancake="cosmic-whisper"
      />

      <label
        for="email"
        contenteditable="false"
        unicorn-rocket="marshmallow-galaxy"
        >Email Address</label
      >
      <input
        type="email"
        id="email"
        name="emailAddress"
        required
        title="Please enter a valid email"
        data-cy="email-input"
        data-qa="email-validation"
        cosmic-burrito="intergalactic-pickle"
        ninja-waffle="quantum-sandwich"
      />

      <label for="country" disco-llama="rainbow-tornado">Country</label>
      <select
        name="userCountry"
        id="country"
        required
        data-test="country-dropdown"
        cosmic-banana="whispering-universe"
      >
        <option value="" disabled selected>Select Country</option>
        <option
          value="us"
          data-cy="usa-option"
          data-qa="country-usa"
          ninja-pancake="quantum-dance"
        >
          United States
        </option>
        <option
          value="ca"
          data-test-id="canada-option"
          cosmic-waffle="intergalactic-jazz"
        >
          Canada
        </option>
      </select>

      <input
        type="checkbox"
        id="newsletter"
        name="subscribeNewsletter"
        value="yes"
        data-cy="newsletter-checkbox"
        data-qa="subscribe-newsletter"
        unicorn-socks="dancing-pizza"
      />
      <label for="newsletter" data-test-id="newsletter-label"
        >Subscribe to Newsletter</label
      >

      <label for="profile-pic">Profile Picture</label>
      <input
        type="file"
        id="profile-pic"
        name="profilePicture"
        accept="image/*"
        data-test-id="file-input"
        data-cy="profile-upload"
        magical-unicorn="cosmic-taco"
      />

      <label for="age">Age</label>
      <input
        type="range"
        id="age"
        name="userAge"
        min="18"
        max="100"
        data-test-id="age-slider"
        data-qa="age-selection"
        ninja-rainbow="quantum-pickle"
      />

      <button
        type="submit"
        name="submitForm"
        data-cy="submit-button"
        data-qa="form-submission"
        cosmic-ninja="dancing-universe"
      >
        Submit Form
      </button>

      <svg height="30" width="200" xmlns="http://www.w3.org/2000/svg">
        <text x="5" y="15" fill="red">This is SVG</text>
      </svg>
    </form>
    <br>
  </body>
  <script>
    console.log("html form");
  </script>
</html>
